<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Signal Scoop Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; touch-action: none; }
    #hud {
      position: fixed; left: 12px; right: 12px; top: 10px; z-index: 10;
      color: #9aa3b2; font: 12px/1.4 system-ui, sans-serif; pointer-events: none;
    }
    #hud strong { color: #39ff14; font-weight: 600; }
    #legend { position: fixed; bottom: 12px; left: 12px; z-index: 10; color: #9aa3b2; font: 11px system-ui; }
    #legend span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  </style>
</head>
<body>
  <div id="hud"><strong>3D graph</strong> · pinch/drag to explore · local data only</div>
  <div id="legend"></div>
  <script src="three.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
