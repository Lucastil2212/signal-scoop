<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Signal Scoop Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(ellipse at 50% 30%, #12121a 0%, #0a0a0f 70%);
      touch-action: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #hud {
      position: fixed; left: 10px; right: 10px; top: 8px; z-index: 20;
      pointer-events: none;
      display: flex; flex-direction: column; gap: 4px;
    }
    #hud .title {
      color: #39ff14; font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
    }
    #hud .stats {
      color: #9aa3b2; font-size: 11px; line-height: 1.35;
    }
    #hud .stats em { color: #e8ecf4; font-style: normal; font-weight: 600; }
    #legend {
      position: fixed; bottom: 10px; left: 10px; z-index: 20;
      display: flex; flex-wrap: wrap; gap: 8px 12px;
      padding: 8px 10px; border-radius: 10px;
      background: rgba(10, 10, 15, 0.72);
      border: 1px solid rgba(57, 255, 20, 0.15);
      color: #9aa3b2; font-size: 10px;
    }
    #legend .item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    #legend .dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
    }
    #labels {
      position: fixed; left: 0; top: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 15; overflow: hidden;
    }
    .node-label {
      position: absolute;
      transform: translate(-50%, -100%);
      padding: 2px 7px 3px;
      border-radius: 6px;
      font-size: 10px; font-weight: 600; line-height: 1.2;
      color: #f0f4fc;
      background: rgba(12, 14, 22, 0.88);
      border: 1px solid rgba(122, 231, 255, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
      max-width: 120px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .node-label.scan { border-color: rgba(57, 255, 20, 0.5); color: #c8ffd0; }
    .node-label.place { border-color: rgba(0, 174, 239, 0.5); color: #b8ecff; }
    .node-label.signal { border-color: rgba(122, 231, 255, 0.35); font-weight: 500; font-size: 9px; }
    .node-label.selected {
      border-color: #39ff14; color: #39ff14;
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.35);
    }
    #empty {
      position: fixed; inset: 0; z-index: 25;
      display: none; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      color: #9aa3b2; font-size: 13px; line-height: 1.5;
      pointer-events: none;
    }
    #empty.visible { display: flex; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Knowledge graph</div>
    <div class="stats" id="stats">Loading…</div>
  </div>
  <div id="labels"></div>
  <div id="legend"></div>
  <div id="empty">Run scans to build nodes and links. Your graph stays on this device.</div>
  <script src="three.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
